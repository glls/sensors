# k3s ships with Traefik as the default ingress controller.
# App is accessible at http://sensors.192.168.33.50.nip.io
# nip.io is a public wildcard DNS - no /etc/hosts or local DNS needed.
# WebSockets are handled natively by Traefik - no extra config required.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sensors
  namespace: sensors
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: sensors.192.168.33.50.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sensors
                port:
                  number: 80
