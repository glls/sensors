apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensors
  namespace: sensors
  labels:
    app: sensors
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensors
  template:
    metadata:
      labels:
        app: sensors
    spec:
      containers:
        - name: sensors
          image: 192.168.33.33:5000/sensors:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: sensors.settings
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: sensors-config
                  key: DEBUG
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: sensors-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: sensors-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: sensors-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: sensors-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sensors-secret
                  key: DB_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sensors-secret
                  key: SECRET_KEY
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            # Pod won't receive traffic until this passes.
            # Prevents requests hitting a pod that isn't ready yet.
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            # If this fails 3 times in a row, k3s kills and restarts the pod.
            # initialDelaySeconds must be > readinessProbe to avoid killing
            # a pod that is still starting up.
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
